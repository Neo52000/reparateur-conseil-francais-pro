[build]
  command = "bun run build"
  publish = "dist"

# ---------------------------------------------------------------------------
# Lighthouse audit auto sur chaque deploy preview (mobile + desktop).
# Non bloquant : produit un rapport visible dans les checks GitHub.
# Seuils alignés sur l'objectif Phase 4 (≥ 85 mobile / ≥ 90 desktop).
# ---------------------------------------------------------------------------
[[plugins]]
  package = "@netlify/plugin-lighthouse"

  [plugins.inputs]
    output_path = "reports/lighthouse.html"

  [plugins.inputs.thresholds]
    performance = 0.80
    accessibility = 0.90
    best-practices = 0.90
    seo = 0.90

  [[plugins.inputs.audits]]
    path = "/"

  [[plugins.inputs.audits]]
    path = "/search"

  [[plugins.inputs.audits]]
    path = "/blog"

# SEO 301 redirects (must come BEFORE the SPA catch-all)
[[redirects]]
  from = "/blog/article/:slug"
  to = "/blog/:slug"
  status = 301
  force = true

[[redirects]]
  from = "/blog/repairers/article/:slug"
  to = "/blog/repairers/:slug"
  status = 301
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ---------------------------------------------------------------------------
# Security headers (apply to every response)
# ---------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://*.sentry.io;
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: blob: https:;
      font-src 'self' data:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.sentry.io https://o*.ingest.sentry.io https://generativelanguage.googleapis.com https://api.openai.com https://api.mistral.ai https://api.perplexity.ai https://api.stripe.com https://*.tile.openstreetmap.org https://nominatim.openstreetmap.org https://*.mapbox.com https://api.dicebear.com https://images.unsplash.com;
      frame-src 'self' https://js.stripe.com https://hooks.stripe.com;
      worker-src 'self' blob:;
      manifest-src 'self';
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'none';
      object-src 'none';
      upgrade-insecure-requests;
    """

# ---------------------------------------------------------------------------
# Caching strategy
# ---------------------------------------------------------------------------
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/lovable-uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
