name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Lint temporarily non-blocking : 1471 erreurs héritées du prototype Lovable.
      # Plan de résorption : fin Phase 1 (cf. DETTE_TECHNIQUE.md). En attendant,
      # le pre-commit hook husky+lint-staged empêche toute nouvelle régression.
      - name: Lint (non-blocking, legacy debt)
        run: bun run lint
        continue-on-error: true

      - name: Type check
        run: bun run tsc --noEmit

      - name: Build
        run: bun run build
