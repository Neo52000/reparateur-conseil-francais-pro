name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Lint temporarily non-blocking : 1471 erreurs héritées du prototype Lovable.
      # Plan de résorption : fin Phase 1 (cf. DETTE_TECHNIQUE.md). En attendant,
      # le pre-commit hook husky+lint-staged empêche toute nouvelle régression.
      - name: Lint (non-blocking, legacy debt)
        run: bun run lint
        continue-on-error: true

      # `tsc -b` actually walks the project references (the previous bare
      # `tsc --noEmit` on the solution-style root config was a no-op).
      # Currently surfaces hundreds of pre-existing errors in legacy code,
      # so this step is non-blocking like the lint backlog. The strict
      # ratchet below is the real type-safety gate.
      - name: Type check (full project, lenient, non-blocking)
        run: bun run typecheck
        continue-on-error: true

      # Strict mode ratchet — covers a curated set of leaf modules
      # (cf. tsconfig.strict.json `include`). Expand the include list as
      # we fix typing in the rest of the codebase.
      - name: Type check (strict, critical paths)
        run: bun run typecheck:strict

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
