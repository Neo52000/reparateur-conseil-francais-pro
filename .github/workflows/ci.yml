name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Lint temporarily non-blocking : 1471 erreurs héritées du prototype Lovable.
      # Plan de résorption : fin Phase 1 (cf. DETTE_TECHNIQUE.md). En attendant,
      # le pre-commit hook husky+lint-staged empêche toute nouvelle régression.
      - name: Lint (non-blocking, legacy debt)
        run: bun run lint
        continue-on-error: true

      - name: Type check (full project, lenient)
        run: bun run typecheck

      # Strict mode ratchet — covers a curated set of leaf modules
      # (cf. tsconfig.strict.json `include`). Expand the include list as
      # we fix typing in the rest of the codebase.
      - name: Type check (strict, critical paths)
        run: bun run typecheck:strict

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
